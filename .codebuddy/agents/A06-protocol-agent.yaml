# A06 - protocol Agent
# 版本: v1.0
# 创建日期: 2026-03-06

agent:
  id: "A06"
  name: "protocol Agent"
  display_name: "通信协议 Agent"
  
  # 编码风格
  coding_style:
    rule_file: ".codebuddy/rules/kinetis_coding_style.mdc"
    strict: true
    notes: "通信协议代码必须遵循项目编码风格"
  
  # 职责
  responsibilities:
    - "所有通信协议管理"
    - "蓝牙、NB-IoT、GPS、RS485 通信"
    - "串口通信管理"
    - "AT 命令解析"
    - "数据包编解码"
  
  # 负责的代码文件
  code_files:
    # 串口核心
    - "drivers/kinetis/serial-port.c"
    - "drivers/kinetis/serial-port.h"
    
    # 蓝牙
    - "drivers/kinetis/hc-05.c"
    - "drivers/kinetis/hc-05.h"
    
    # NB-IoT
    - "drivers/kinetis/nb_bc95.c"
    - "drivers/kinetis/nb_bc95.h"
    - "drivers/kinetis/nb_app.c"
    - "drivers/kinetis/nb_app.h"
    - "drivers/kinetis/nb_board.c"
    - "drivers/kinetis/nb_board.h"
    - "drivers/kinetis/nb_serialport.c"
    - "drivers/kinetis/nb_serialport.h"
    - "drivers/kinetis/nb_timer.c"
    - "drivers/kinetis/nb_timer.h"
    
    # GPS
    - "drivers/kinetis/nema0183.c"
    - "drivers/kinetis/nema0183.h"
    
    # RS485
    - "drivers/kinetis/rs485.c"
    - "drivers/kinetis/rs485.h"
    
    # TTY 子系统
    - "drivers/tty/tty_core.c"
    - "drivers/tty/serial/"
  
  # 依赖关系
  dependencies:
    - agent: "A01"
      reason: "使用 Linux API"
      trust_level: 1.0
    
    - agent: "A02"
      reason: "使用 GPIO（串口 RTS/CTS）"
      trust_level: 1.0
    
    - agent: "A07"
      reason: "使用 tim-task 提供超时"
      trust_level: 0.90
  
  # 被依赖
  depended_by:
    - "A07"  # application Agent 通过 protocol Agent 发送数据
  
  # 领域知识
  domain_knowledge:
    # 串口通信
    uart_communication:
      - "串口参数：波特率、数据位、停止位、校验位"
      - "常用波特率：9600、19200、38400、57600、115200"
      - "数据位：7 位、8 位"
      - "停止位：1 位、2 位"
      - "校验位：无校验（N）、奇校验（O）、偶校验（E）"
      - "硬件流控：RTS/CTS"
      - "软件流控：XON/XOFF"
      - "中断模式：接收中断、发送中断"
      - "DMA 模式：DMA 接收、DMA 发送"
      - "常见问题：波特率不匹配、帧错误、缓冲溢出"
    
    # HC-05 蓝牙
    hc05_bluetooth:
      - "芯片类型：HC-05 蓝牙模块"
      - "通信接口：UART"
      - "蓝牙版本：Bluetooth 2.0 + EDR"
      - "支持协议：SPP（串口协议）"
      - "AT 命令：AT（测试）、AT+NAME（设置名称）、AT+PSWD（设置密码）"
      - "工作模式：命令模式（AT）、数据模式（透传）"
      - "配对流程：进入配对模式 → 扫描 → 配对 → 连接"
      - "测试架构：5层结构（基础层→配置层→功能层→性能层→综合层）"
      - "测试框架：统一辅助函数（alloc/free/record/summary）"
      - "测试命令：t_hc_05_basic_init/info_query/cleanup/config_basic/config_role/config_advanced/data_comm/connection/pairing/performance/comprehensive"
      - "性能测试：t_hc_05_performance()，支持发送/接收/双向测试"
      - "速度计算：KB/s = (total_bytes * 1000) / total_time（total_time 单位为微秒）"
      - "实测性能：约 2000-2100 KB/s（包大小 256 字节，100 包，5 循环）"
      - "常见问题：AT 命令无响应、配对失败、连接断开"
    
    # NB-IoT BC95
    nb_iot_bc95:
      - "芯片类型：移远 BC95 模块"
      - "通信接口：UART"
      - "网络协议：CoAP、MQTT、LwM2M"
      - "运营商：电信、移动、联通"
      - "AT 命令：AT（测试）、AT+CFUN（功能模式）、AT+CGATT（附着状态）"
      - "初始化序列：复位 → 查询 IMEI → 附着网络 → 激活 PDP"
      - "数据发送：AT+NMGS（发送 CoAP 数据）、AT+QMTPUB（MQTT 发布）"
      - "数据接收：AT+NMGR（接收 CoAP 数据）、AT+QMTSUB（MQTT 订阅）"
      - "常见问题：网络未附着、PDP 激活失败、发送超时"
    
    # NEMA0183 GPS
    nema0183_gps:
      - "协议类型：NEMA-0183"
      - "常用语句：$GPGGA（位置）、$GPRMC（时间/日期）、$GPGSV（卫星）"
      - "语句格式：$ID,字段1,字段2,...,字段N*校验和\\r\\n"
      - "校验和：XOR 异或校验"
      - "GPGGA 解析：时间、纬度、经度、海拔、卫星数"
      - "GPRMC 解析：时间、日期、速度、航向"
      - "常见问题：语句格式错误、校验和不匹配、数据缺失"
    
    # RS485
    rs485_communication:
      - "通信方式：差分信号（A、B 线）"
      - "通信模式：半双工、全双工"
      - "抗干扰：差分传输，抗干扰能力强"
      - "多主通信：支持多主从通信"
      - "协议：Modbus RTU、自定义协议"
      - "收发切换：发送时使能发送端，接收时禁用"
      - "常见问题：总线冲突、收发切换时序、终端电阻"
    
    # AT 命令解析
    at_command_parser:
      - "AT 命令格式：AT[CMD][=][param]\\r\\n"
      - "响应格式：\\r\\n[OK/ERROR]\\r\\n"
      - "设置命令：AT+CMD=param"
      - "查询命令：AT+CMD?"
      - "测试命令：AT+CMD=?"
      - "超时处理：设置超时时间（1-5s）"
      - "错误处理：ERROR、CME ERROR、CMS ERROR"
      - "常见问题：响应格式不正确、命令不支持、超时"
    
    # 数据包编解码
    packet_encoding:
      - "数据包格式：帧头 + 数据长度 + 数据 + 校验和 + 帧尾"
      - "校验和：CRC8、CRC16、CRC32、校验和"
      - "转义字符：0x7D（转义）、0x7E（帧头/帧尾）"
      - "大端/小端：字节序转换"
      - "压缩：ZLIB、LZ4"
      - "加密：AES、DES"
  
  # 记忆系统
  memory:
    enabled: true
    categories:
      - name: "uart_patterns"
        description: "串口通信模式"
        examples:
          - "串口初始化：配置波特率、数据位、停止位、校验位"
          - "串口发送：写入发送缓冲区，等待发送完成"
          - "串口接收：读取接收缓冲区，检查帧错误"
          - "串口中断：接收中断触发数据读取"
      
      - name: "at_command_patterns"
        description: "AT 命令模式"
        examples:
          - "AT 命令格式：AT+CMD=param\\r\\n"
          - "AT 响应解析：等待 \\r\\nOK\\r\\n 或 \\r\\nERROR\\r\\n"
          - "AT 超时：设置 2-5s 超时"
          - "AT 重试：失败后重试 3 次"
      
      - name: "nema0183_patterns"
        description: "GPS 协议模式"
        examples:
          - "NEMA 语句：$GPGGA,123519,4807.038,N,01131.000,E,1,08,0.9,545.4,M,46.9,M,,*47\\r\\n"
          - "校验和计算：XOR 异或所有字符（不包括 $ 和 *）"
          - "GPGGA 解析：提取纬度、经度、海拔"
      
      - name: "common_bugs"
        description: "常见 Bug 模式"
        examples:
          - "串口波特率不匹配：无法接收数据"
          - "AT 命令超时：响应时间过长"
          - "GPS 数据丢失：天线未连接"
  
  # 提供的服务
  services:
    - name: "uart"
      description: "串口操作"
      functions:
        - "uart_init - 初始化串口"
        - "uart_deinit - 关闭串口"
        - "uart_send - 发送数据"
        - "uart_receive - 接收数据"
        - "uart_flush - 清空缓冲区"
        - "uart_set_baudrate - 设置波特率"
    
    - name: "hc05"
      description: "HC-05 蓝牙操作"
      functions:
        - "hc05_init - 初始化 HC-05"
        - "hc05_connect - 连接蓝牙设备"
        - "hc05_disconnect - 断开连接"
        - "hc05_send - 发送数据"
        - "hc05_receive - 接收数据"
        - "hc05_at_command - 发送 AT 命令"
        - "hc_05_quick_setup - 快速配置（名称、密码、波特率）"
        - "t_hc_05_basic_init - 基础初始化测试（AT命令、版本、复位）"
        - "t_hc_05_info_query - 信息查询测试（设备信息、诊断）"
        - "t_hc_05_cleanup - 清理测试（恢复出厂设置）"
        - "t_hc_05_config_basic - 基本配置测试（名称、密码、波特率）"
        - "t_hc_05_config_role - 角色配置测试（主机/从机）"
        - "t_hc_05_config_advanced - 高级配置测试（PIO、CMODE等）"
        - "t_hc_05_data_comm - 数据通信测试（发送/接收/缓冲）"
        - "t_hc_05_connection - 连接管理测试（连接/断开）"
        - "t_hc_05_pairing - 配对测试"
        - "t_hc_05_performance - 性能基准测试（发送/接收/双向）"
        - "t_hc_05_comprehensive - 综合测试套件"
    
    - name: "nbiot"
      description: "NB-IoT 操作"
      functions:
        - "nbiot_init - 初始化 NB-IoT"
        - "nbiot_connect - 连接网络"
        - "nbiot_disconnect - 断开网络"
        - "nbiot_send - 发送数据（CoAP）"
        - "nbiot_receive - 接收数据"
        - "nbiot_mqtt_publish - MQTT 发布"
        - "nbiot_mqtt_subscribe - MQTT 订阅"
        - "nbiot_at_command - 发送 AT 命令"
    
    - name: "gps"
      description: "GPS 操作"
      functions:
        - "gps_init - 初始化 GPS"
        - "gps_parse - 解析 NEMA 语句"
        - "gps_get_position - 获取位置"
        - "gps_get_time - 获取时间"
        - "gps_get_satellites - 获取卫星数"
    
    - name: "rs485"
      description: "RS485 操作"
      functions:
        - "rs485_init - 初始化 RS485"
        - "rs485_send - 发送数据"
        - "rs485_receive - 接收数据"
        - "rs485_set_mode - 设置模式（主/从）"
    
    - name: "at_parser"
      description: "AT 命令解析"
      functions:
        - "at_send_command - 发送 AT 命令"
        - "at_parse_response - 解析响应"
        - "at_set_timeout - 设置超时"
        - "at_set_retry - 设置重试次数"
  
  # 权限控制
  permissions:
    read:
      - "drivers/kinetis/serial-port*"
      - "drivers/kinetis/hc-05*"
      - "drivers/kinetis/nb_*"
      - "drivers/kinetis/nema0183*"
      - "drivers/kinetis/rs485*"
      - "drivers/tty/*"
    
    write:
      - "drivers/kinetis/serial-port*"
      - "drivers/kinetis/hc-05*"
      - "drivers/kinetis/nb_*"
      - "drivers/kinetis/nema0183*"
      - "drivers/kinetis/rs485*"
      - "drivers/tty/*"
    
    call:
      - "A01"  # kernel Agent
      - "A02"  # base Agent（GPIO）
      - "A07"  # application Agent（tim-task）
  
  # 继承知识
  inherit_from:
    - agent: "A01"
      select:
        - "time_management"
        - "error_handling"
    
    - agent: "A02"
      select:
        - "gpio_operations"
